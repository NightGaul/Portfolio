<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purrfect Kill</title>

    <link rel="stylesheet" href="Template.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap"
          rel="stylesheet">
    <script src="PurrfectKill.js"></script>
</head>
<body>
<header id="title">
    Project 1
</header>
<div class="wrapper">
    <div class="leftTexts">
        <div id="MainImage" class="elements">
            <img class="projectImage" src="../../Images/PK.png" alt="mainImage">
        </div>
        <div class="elements" id="PeopleWrapper">

            <div>
                <div class="elementTitle">Team</div>
                <div class="text" id="team">Team</div>
            </div>
            <div>
                <div class="elementTitle">Role</div>
                <div class="text" id="role">Role</div>
            </div>

        </div>
        <div class="elements">
            <div class="elementTitle">Focus</div>
            <div class="text" id="focus">Focus</div>
        </div>
    </div>
    <div class="rightTexts">
        <div class="elements">
            <div class="elementTitle">Description</div>
            <div class="text" id="description">Description</div>
        </div>
        <div class="elements">
            <div class="elementTitle">Reflection</div>
            <div class="text" id="reflection">Reflection</div>
        </div>
    </div>
</div>
<div class="elements">
    <div class="elementTitle">Visual Insight</div>
    <div class="insightHorizontal elementInsight">
        <div class="imageAndTextHorizontal">
            <img class="insightImageHorizontal" src="Images/HorizontalScreenShot_PurrfectKill.png">
            <div class="imageTexts text">
                The cat as the main character,drawing an enemies attention.
            </div>
        </div>
        <div class="imageAndTextHorizontal">
            <img class="insightImageHorizontal" src="Images/HorizontalScreenShot_PurrfectKill_2.png">
            <div class="imageTexts text">
                The cat stalking its next victim. Hiding in plain sight over everybody's head
            </div>
        </div>
    </div>
    <a href="https://qiryth.itch.io/purrfect-kill" target="_blank" class="text">Visit the itch.io page!</a>
</div>
</body>
</html>
