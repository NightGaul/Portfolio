<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Template</title>

    <link rel="stylesheet" href="Template.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap"
          rel="stylesheet">
    <script src="Template.js"></script>
</head>
<body>
<header id="title">
    Project 1
</header>
<div class="wrapper">
    <div class="leftTexts">
        <div id="MainImage" class="elements">
            <img class="projectImage" src="../Images/keyring.png" alt="mainImage">
        </div>
        <div class="elements" id="PeopleWrapper">

            <div>
                <div class="elementTitle">Team</div>
                <div class="text" id="team">Team</div>
            </div>
            <div>
                <div class="elementTitle">Role</div>
                <div class="text" id="role">Role</div>
            </div>

        </div>
        <div class="elements">
            <div class="elementTitle">Focus</div>
            <div class="text" id="focus">Focus</div>
        </div>
    </div>
    <div class="rightTexts">
        <div class="elements">
            <div class="elementTitle">Description</div>
            <div class="text" id="description">Description</div>
        </div>
        <div class="elements">
            <div class="elementTitle">Reflection</div>
            <div class="text" id="reflection">Reflection</div>
        </div>
    </div>

</div>
</body>
</html>
